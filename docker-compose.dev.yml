services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: ["echo", "Use 'npm run dev' locally instead"]
    profiles: ["production"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn quip.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: sqlite+aiosqlite:///quip.db
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on: {}

  postgres:
    profiles: ["production"]
