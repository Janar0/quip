services:
  app:
    image: ghcr.io/janar0/quip/app:latest
    ports:
      - "${PORT:-3000}:80"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///data/quip.db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - quip_data:/app/data
    restart: unless-stopped
    depends_on:
      sandbox_build:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Builds quip-sandbox:latest image, then exits.
  # The backend (via docker.sock) uses this image to run code execution containers.
  sandbox_build:
    image: docker:cli
    entrypoint: ["sh", "-c", "docker pull ghcr.io/janar0/quip/sandbox:latest && docker tag ghcr.io/janar0/quip/sandbox:latest quip-sandbox:latest"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"

volumes:
  quip_data:
